<meta charset="UTF-8">

<style>
:root {
  --emerald: #3DAA78;
  --emerald-light: #d0ece0;
  --emerald-pale: #edf8f2;
  --emerald-dark: #1e7a4f;
  --gold: #c9a96e;
  --gold-light: #f5ead8;
  --text: #0f1e16;
  --text-muted: #4d7062;
  --text-light: #8aae9a;
  --white: #ffffff;
  --bg: #f4faf7;
  --border: #c8e0d4;
  --nav-h: 60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;}

/* ── Nav ── */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(244,250,247,0.92);backdrop-filter:blur(12px);border-top:3px solid var(--emerald);border-bottom:1px solid var(--border);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 40px;}
.nav-logo{font-family:'Shippori Mincho',serif;font-size:18px;color:var(--emerald-dark);letter-spacing:0.08em;text-decoration:none;}.nav-links{display:flex;gap:0;align-items:center;}
.nav-links a{text-decoration:none;font-size:11px;letter-spacing:0.1em;color:var(--text-muted);padding:6px 14px;border-radius:20px;transition:all 0.2s;white-space:nowrap;}
.nav-links a:hover,.nav-links a.active{color:var(--emerald-dark);background:var(--emerald-light);}

/* ── Page hero ── */
.page-hero{padding:calc(var(--nav-h) + 48px) 40px 40px;max-width:1100px;margin:0 auto;}
.page-hero-tag{display:inline-block;font-size:10px;letter-spacing:0.25em;color:var(--emerald);border:1px solid var(--emerald-light);padding:4px 14px;border-radius:20px;margin-bottom:16px;}
.page-hero h1{font-family:'Shippori Mincho',serif;font-size:36px;font-weight:500;line-height:1.2;color:var(--text);margin-bottom:8px;}
.page-hero h1 em{color:var(--emerald-dark);font-style:normal;}
.page-hero p{font-size:12px;color:var(--text-muted);letter-spacing:0.06em;}
.last-updated{font-size:10px;color:var(--text-light);margin-top:6px;letter-spacing:0.04em;}

/* ── Content area ── */
.content{max-width:1100px;margin:0 auto;padding:0 40px 80px;}

/* ── Footer ── */
footer{background:var(--white);border-top:1px solid var(--border);padding:32px 40px;text-align:center;}
footer p{font-size:10px;letter-spacing:0.12em;color:var(--text-light);}
footer .heart{color:var(--emerald);}

/* ── Card base ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;animation:fadeUp 0.4s ease both;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(61,170,120,0.12);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── Grid ── */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
@media(max-width:900px){.grid-3{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}}
@media(max-width:600px){.grid-3,.grid-2{grid-template-columns:1fr;}}

/* ── Status badge ── */
.badge{display:inline-block;font-size:10px;letter-spacing:0.08em;padding:3px 10px;border-radius:10px;font-weight:500;}
.badge-open{background:#e8f5e9;color:#2e7d32;}
.badge-closed{background:#f5f5f5;color:#757575;}
.badge-blog{background:var(--emerald-light);color:var(--emerald-dark);}
.badge-x{background:#e8f0fe;color:#1a56db;}
.badge-tiktok{background:#fff0f3;color:#fe2c55;}
.badge-youtube{background:#fff3e0;color:#e65100;}
.badge-lemino{background:#f3e5f5;color:#6a1b9a;}
.badge-interview{background:var(--gold-light);color:#7d5a00;}
.badge-web{background:#e0f7fa;color:#006064;}

/* ── News list card ── */
.news-card{padding:20px 24px;display:flex;gap:20px;align-items:flex-start;}
.news-card--img{padding:0;flex-direction:column;}
.news-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:12px 12px 0 0;}
.news-card-img-body{padding:16px 20px 18px;width:100%;}
.news-card-date{font-size:11px;color:var(--text-light);letter-spacing:0.06em;white-space:nowrap;padding-top:2px;min-width:80px;}
.news-card-body{flex:1;}
.news-card-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.5;}
.news-card-desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:8px;}
.news-card-link{font-size:11px;color:var(--emerald);text-decoration:none;letter-spacing:0.04em;}
.news-card-link:hover{color:var(--emerald-dark);}

/* ── Media card ── */
.media-card .media-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--emerald-pale);}
.media-card .media-body{padding:16px;}
.media-card .media-title{font-size:13px;font-weight:500;margin-bottom:6px;line-height:1.5;}
.media-card .media-desc{font-size:11px;color:var(--text-muted);line-height:1.6;margin-bottom:10px;}
.media-card .media-meta{display:flex;align-items:center;justify-content:space-between;}
.media-card .media-date{font-size:10px;color:var(--text-light);}

/* ── Embed card ── */
.embed-card .embed-header{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.embed-card .embed-wrap{background:var(--emerald-pale);min-height:300px;display:flex;align-items:center;justify-content:center;padding:8px;}
.embed-card .embed-footer{padding:10px 16px 14px;}
.embed-card .embed-title{font-size:12px;color:var(--text);margin-bottom:4px;}
.embed-card .embed-link{font-size:11px;color:var(--emerald);text-decoration:none;}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:32px 0;}

/* ── Activity Modal ── */
.act-modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,30,20,0.55);z-index:400;align-items:center;justify-content:center;padding:20px;}
.act-modal-overlay.open{display:flex;}
.act-modal-box{background:var(--white);border-radius:16px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:32px 36px;position:relative;}
.act-modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);line-height:1;}
.act-modal-close:hover{color:var(--text);}
.act-modal-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:8px;margin-bottom:20px;display:block;}
.act-modal-title{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:500;line-height:1.5;margin-bottom:10px;color:var(--text);}
.act-modal-meta{display:flex;gap:8px;align-items:center;margin-bottom:18px;}
.act-modal-desc{font-size:13px;color:var(--text-muted);line-height:1.9;}
.act-modal-link{display:inline-block;margin-top:18px;font-size:12px;color:var(--emerald);text-decoration:none;letter-spacing:0.04em;}
.act-modal-link:hover{color:var(--emerald-dark);}
[data-act-modal]{cursor:pointer;}
</style>
</head>

<!-- Activity Modal -->
<div id="act-modal" class="act-modal-overlay">
  <div class="act-modal-box">
    <button class="act-modal-close" aria-label="閉じる">×</button>
    <div id="act-modal-inner"></div>
  </div>
</div>

<script>
(function(){
  function openModal(data) {
    var inner = document.getElementById('act-modal-inner');
    var badgeHtml = data.status
      ? '<span class="badge ' + (data.status.includes('募集中') ? 'badge-open' : 'badge-closed') + '">' + data.status + '</span>'
      : '';
    var imgHtml = data.img ? '<img class="act-modal-img" src="' + data.img + '" alt="">' : '';
    inner.innerHTML = imgHtml +
      '<p class="act-modal-title"></p>' +
      '<div class="act-modal-meta">' + badgeHtml + '<span style="font-size:11px;color:var(--text-light)"></span></div>' +
      '<p class="act-modal-desc"></p>' +
      (data.url ? '<a href="' + data.url + '" class="act-modal-link" target="_blank" rel="noopener">詳しく見る →</a>' : '');
    inner.querySelector('.act-modal-title').textContent = data.title || '';
    inner.querySelector('.act-modal-meta span').textContent = data.date || '';
    var descEl = inner.querySelector('.act-modal-desc');
    (data.desc || '').split('\n').forEach(function(line, i, arr) {
      descEl.appendChild(document.createTextNode(line));
      if (i < arr.length - 1) descEl.appendChild(document.createElement('br'));
    });
    document.getElementById('act-modal').classList.add('open');
  }
  document.addEventListener('click', function(e) {
    var card = e.target.closest('[data-act-modal]');
    var modal = document.getElementById('act-modal');
    if (card) { openModal(card.dataset); return; }
    if (modal && (e.target === modal || e.target.closest('.act-modal-close'))) {
      modal.classList.remove('open');
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { var m = document.getElementById('act-modal'); if(m) m.classList.remove('open'); }
  });
})();
</script>
