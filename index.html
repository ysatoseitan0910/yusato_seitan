<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佐藤優羽 TikTok Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f4a7b9;
    --pink-light: #fde8ee;
    --pink-dark: #d4607a;
    --cream: #fdf6f0;
    --text: #2a1a1f;
    --text-muted: #9a7a84;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(212,96,122,0.10);
    --shadow-hover: 0 8px 40px rgba(212,96,122,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid #f0dde4;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--pink-dark);
    letter-spacing: 0.02em;
  }

  .logo span {
    font-style: normal;
    font-size: 11px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    display: block;
    margin-top: -4px;
  }

  nav a {
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    transition: color 0.2s;
  }

  nav a:hover { color: var(--pink-dark); }

  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 400px;
    background: radial-gradient(circle, #fde8ee 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-tag {
    display: inline-block;
    background: var(--pink-light);
    color: var(--pink-dark);
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .hero h1 em { color: var(--pink-dark); font-style: italic; }

  .hero p {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .last-updated {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 28px;
  }

  .gallery {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  @media (max-width: 800px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .gallery { grid-template-columns: 1fr; } }

  .card {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 8px;
  }

  .platform-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #fe2c55;
  }

  .platform-icon {
    width: 18px; height: 18px;
    border-radius: 4px;
    background: #fe2c55;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 900;
  }

  .card-date {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .embed-wrap {
    background: var(--pink-light);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    min-height: 400px;
  }

  .embed-wrap blockquote {
    margin: 0 !important;
    width: 100% !important;
  }

  .card-footer {
    padding: 10px 14px 14px;
  }

  .card-title {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--pink-dark);
    text-decoration: none;
    letter-spacing: 0.04em;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .card-link:hover { opacity: 1; }

  footer {
    text-align: center;
    padding: 32px;
    border-top: 1px solid #f0dde4;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    background: var(--white);
  }

  .footer-heart { color: var(--pink); margin: 0 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    Yu Gallery
    <span>佐藤優羽 TikTok まとめ</span>
  </div>
  <nav>
    <a href="#">委員会について</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-tag">SATO YU FAN COMMITTEE</div>
  <h1>TikTok <em>Gallery</em></h1>
  <p>佐藤優羽のTikTok投稿をまとめています</p>
</section>

<p class="last-updated">最終更新：<!-- LAST_UPDATED --></p>

<div class="gallery" id="gallery">
<!-- GALLERY_START -->
<!-- GALLERY_END -->
</div>

<footer>
  <p>佐藤優羽生誕祭実行委員会 <span class="footer-heart">♥</span> Sato Yu Fan Committee</p>
</footer>

<script async src="https://www.tiktok.com/embed.js"></script>

</body>
</html>
