name: Build & Deploy

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @notionhq/client@2.2.15

      - name: Add new blog posts
        run: node add_blog_posts.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_BLOG:      ${{ secrets.DB_BLOG }}

      - name: Build all pages
        run: node build.js
        env:
          NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
          DB_COMMITTEE_NEWS:   ${{ secrets.DB_COMMITTEE_NEWS }}
          DB_YU_NEWS:          ${{ secrets.DB_YU_NEWS }}
          DB_ACTIVITIES:       ${{ secrets.DB_ACTIVITIES }}
          DB_BLOG:             ${{ secrets.DB_BLOG }}
          DB_INTERVIEW:        ${{ secrets.DB_INTERVIEW }}
          DB_TIKTOK:           ${{ secrets.DB_TIKTOK }}
          DB_X:                ${{ secrets.DB_X }}
          DB_YOUTUBE:          ${{ secrets.DB_YOUTUBE }}
          DB_LEMINO:           ${{ secrets.DB_LEMINO }}
          DB_WEB:              ${{ secrets.DB_WEB }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,node_modules,build.js,add_blog_posts.js,_template.html,package.json,package-lock.json'
